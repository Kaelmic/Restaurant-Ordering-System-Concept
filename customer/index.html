<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Ta' Rita — Table Order</title>

<link rel="stylesheet" href="customer.css">
<link rel="stylesheet" href="../css/responsive.css">

</head>
<body>

<div class="invalid-screen" id="invalidScreen" style="display:none;">
  <div class="icon-wrap" id="invalidIcon"></div>
  <p id="invalidMessage"></p>
</div>

<div class="device" id="app" style="display:none;">
  <header>
    <div class="header-top">
      <div>
        <p class="venue-name" id="venueName">Ta' Rita</p>
        <div class="table-tag"><span class="dot"></span><span id="tableLabel">TABLE 6</span></div>
      </div>
      <div class="header-controls">
        <div class="icon-toggle" id="langToggle">
          <button data-lang="en">EN</button>
          <button data-lang="mt">MT</button>
        </div>
        <button class="theme-btn" id="themeBtn"></button>
      </div>
    </div>
    <div class="quick-actions">
      <button class="quick-btn" id="callWaiterBtn"></button>
      <button class="quick-btn" id="requestBillBtn"></button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <div class="legend" id="legend"></div>
  <div id="reorderBanner"></div>
  <div class="menu" id="menu"></div>

  <div class="order-bar" id="orderBar">
    <div class="order-bar-left">
      <span class="order-bar-count" id="barCount">0 items</span>
      <span class="order-bar-total" id="barTotal">€0.00</span>
    </div>
    <div class="order-bar-cta" id="viewOrderLabel">View order →</div>
  </div>
</div>

<div class="scrim" id="scrim"></div>

<div class="ticket-drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title" id="drawerTitle">Your order</span>
    <button class="drawer-close" id="closeDrawer">✕</button>
  </div>
  <div class="ticket-body" id="ticketBody"></div>
  <div class="drawer-footer">
    <button class="send-btn" id="sendBtn">Send to kitchen</button>
  </div>
</div>

<div class="confirm" id="confirm">
  <div class="confirm-stamp" id="confirmStamp">Sent to kitchen</div>
  <h2 class="confirm-title" id="confirmTitle">Order received</h2>
  <p class="confirm-sub" id="confirmSub"></p>
  <div class="confirm-prep" id="confirmPrep"></div>
  <div class="confirm-order-no"><span id="orderLabelText">Order</span> <span id="orderNo">#—</span> — <span id="confirmTable">Table 6</span></div>

  <div class="status-track">
    <div class="status-track-line">
      <div class="status-track-base"></div>
      <div class="status-track-fill" id="statusFill"></div>
    </div>
    <div class="status-nodes" id="statusTrack">
      <div class="status-step" data-status="new"><div class="node"></div><div class="label" data-key="statusNew">New</div></div>
      <div class="status-step" data-status="preparing"><div class="node"></div><div class="label" data-key="statusPreparing">Preparing</div></div>
      <div class="status-step" data-status="ready"><div class="node"></div><div class="label" data-key="statusReady">Ready</div></div>
      <div class="status-step" data-status="served"><div class="node"></div><div class="label" data-key="statusServed">Served</div></div>
    </div>
  </div>

  <p class="confirm-note" id="confirmNote"></p>
  <button class="back-to-menu" id="backToMenu"></button>
</div>

<script src="../js/customer.js"></script>

</body>
</html>
